<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera Victorino — Pro Dashboard</title>
    <meta name="description" content="Real-time algorithmic trading dashboard with WebSocket data streaming, latency monitoring and portfolio analytics.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">

        <!-- ═══ Nav Sidebar ══════════════════════════════════════════ -->
        <nav class="nav-sidebar" id="navSidebar">
            <div class="nav-brand">
                <span class="nav-brand-icon">MV</span>
                <span class="nav-brand-label">Mera Victorino</span>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="{{ url_for('index') }}" class="nav-link active" id="navDashboard">
                        <i data-lucide="layout-dashboard" class="nav-icon"></i>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('positions') }}" class="nav-link" id="navPositions">
                        <i data-lucide="briefcase" class="nav-icon"></i>
                        <span class="nav-text">Positions</span>
                        <span class="nav-badge" id="navPosBadge">0</span>
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <div class="nav-conn connected" id="navConn">
                    <span class="nav-dot"></span>
                    <span id="navConnLabel">Live</span>
                </div>
            </div>
        </nav>

        <!-- ═══ Page Wrapper ═════════════════════════════════════════ -->
        <div class="page-wrapper">
        <div class="app-wrapper">
        <!-- ═══ Top Bar ═══════════════════════════════════════════ -->
        <header class="topbar" id="topbar">
            <div class="topbar-left">
                <button class="nav-toggle" id="navToggle" onclick="toggleNav()">
                    <i data-lucide="menu" style="width:16px;height:16px"></i>
                </button>
                <span class="page-breadcrumb">
                    <i data-lucide="layout-dashboard" style="width:12px;height:12px"></i>
                    Dashboard
                </span>
            </div>
            <div class="topbar-right">
                <div class="latency-badge good" id="latencyBadge">
                    <span class="latency-dot"></span>
                    <span id="latencyValue">— ms</span>
                </div>
                <div class="conn-status connected" id="connStatus">
                    <i data-lucide="wifi" style="width:12px;height:12px"></i>
                    <span id="connLabel">Connecting</span>
                </div>
            </div>
        </header>

        <!-- ═══ Dashboard Sidebar ═══════════════════════════════════ -->
        <aside class="sidebar" id="sidebar">
            <!-- Account -->
            <div class="sidebar-section">
                <div class="stat-card" style="position:relative">
                    <span class="stat-label">Account Equity</span>
                    <span class="stat-value" id="equity">$0.00</span>
                    <div class="stat-sub">
                        <span id="plTotal" class="up">+$0.00</span>
                    </div>
                    <canvas id="equitySpark" class="stat-sparkline" width="80" height="30"></canvas>
                </div>
                <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
                    <div class="stat-card" style="flex:1">
                        <span class="stat-label">Buying Power</span>
                        <span class="stat-value" id="bp" style="font-size:1rem">$0.00</span>
                    </div>
                    <div class="stat-card" style="flex:1">
                        <span class="stat-label">Day P/L</span>
                        <span class="stat-value" id="dayPl" style="font-size:1rem">$0.00</span>
                        <canvas id="plSpark" class="stat-sparkline" width="60" height="24"></canvas>
                    </div>
                </div>
            </div>

            <!-- Bot Control -->
            <div class="sidebar-section">
                <button id="toggleBtn" class="btn-toggle btn-off" onclick="toggleBot()">
                    <i data-lucide="play" style="width:16px;height:16px"></i>
                    <span>Start Bot</span>
                </button>
            </div>

            <!-- Watchlist -->
            <div class="sidebar-section">
                <div class="sidebar-label">
                    <i data-lucide="eye" style="width:11px;height:11px"></i> Watchlist
                </div>
                <div class="watchlist" id="watchlist"></div>
            </div>

            <!-- Activity History -->
            <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
                <div class="sidebar-label">
                    <i data-lucide="activity" style="width:11px;height:11px"></i> Recent Activity
                </div>
                <div class="hist-list" id="historyList"></div>
            </div>
        </aside>

            <!-- ═══ Main Content ══════════════════════════════════════ -->
            <main class="main-content" id="mainContent">
            <!-- Quick-link to Positions page -->
            <a href="{{ url_for('positions') }}" class="positions-cta">
                <i data-lucide="briefcase" style="width:14px;height:14px"></i>
                <span>View Open / Closed / Pending Positions</span>
                <i data-lucide="arrow-right" style="width:14px;height:14px;margin-left:auto"></i>
            </a>

            <!-- Portfolio Performance Chart -->
            <div class="panel performance-panel">
                <div class="panel-header">
                    <span class="panel-title">
                        <i data-lucide="line-chart" style="width:14px;height:14px"></i>
                        Portfolio Performance
                    </span>
                    <div class="timeframe-selector" id="tfSelector">
                        <button class="tf-btn" onclick="setPerformancePeriod('DAY')">Day</button>
                        <button class="tf-btn active" onclick="setPerformancePeriod('MONTH')">Month</button>
                        <button class="tf-btn" onclick="setPerformancePeriod('YEAR')">Year</button>
                        <button class="tf-btn" onclick="setPerformancePeriod('ALL')">All</button>
                    </div>
                </div>
                <div id="performanceChart" class="chart-container" style="height: 300px; padding: 1rem 0;"></div>
            </div>



            <!-- Event Console -->
            <div class="panel" id="panelConsole">
                <div class="panel-header">
                    <span class="panel-title">
                        <i data-lucide="terminal" style="width:14px;height:14px"></i>
                        Event Console
                    </span>
                    <button class="collapse-btn" onclick="togglePanel('consoleWrap', this)">
                        <i data-lucide="chevron-down" style="width:14px;height:14px"></i>
                    </button>
                </div>
                <div id="consoleWrap" class="collapsible" style="max-height:300px">
                    <div class="console-wrap">
                        <div class="console-toolbar">
                            <button class="console-filter active" data-filter="all" onclick="setConsoleFilter('all', this)">All</button>
                            <button class="console-filter" data-filter="order" onclick="setConsoleFilter('order', this)">Orders</button>
                            <button class="console-filter" data-filter="error" onclick="setConsoleFilter('error', this)">Errors</button>
                            <button class="console-filter" data-filter="info" onclick="setConsoleFilter('info', this)">Info</button>
                        </div>
                        <div class="console-body" id="consoleBody"></div>
                    </div>
                </div>
            </div>
        </main>
        </div><!-- /app-wrapper -->
        </div><!-- /page-wrapper -->
    </div><!-- /app-shell -->

    <!-- ═══ Custom Auth Modal ═══════════════════════════════════ -->
    <div id="authModal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <i data-lucide="shield-check" class="modal-icon"></i>
                <h3 id="modalTitle">Security Access</h3>
            </div>
            <div class="modal-body">
                <p id="modalMsg">Please enter your PIN to continue.</p>
                <div class="input-group">
                    <input type="password" id="modalPin" placeholder="••••" maxlength="10">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeAuthModal(null)">Cancel</button>
                <button class="btn-primary" onclick="submitAuthModal()">Confirm</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>lucide.createIcons();</script>
    <script>
        function toggleNav() {
            const nav = document.getElementById('navSidebar');
            if (window.innerWidth <= 768) {
                nav.classList.toggle('mobile-open');
            } else {
                nav.classList.toggle('collapsed');
            }
        }
    </script>
</body>
</html>
