<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mera Victorino - v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <aside class="sidebar glass">
            <div class="logo"><h1>Mera Victorino</h1></div>
            
            <div class="stat-card">
                <span>Account Equity</span>
                <h2 id="equity">$0.00</h2>
                <div style="display:flex; justify-content:space-between;">
                    <b id="plTotal" class="up">+$0.00</b>
                    <span style="font-size:0.7rem; color:var(--dim)">BP: <span id="bp" style="color:var(--text)">$0.00</span></span>
                </div>
            </div>

            <button id="toggleBtn" class="btn btn-off" onclick="toggle()">
                <i data-lucide="play"></i> START BOT
            </button>

            <div class="watchlist-section">
                <span class="label">WATCHLIST</span>
                <div id="watch" class="watchlist"></div>
            </div>

            <div class="history-section">
                <span class="label">HISTORY</span>
                <div id="history" class="hist-list"></div>
            </div>
        </aside>

        <main class="main-grid">
            <div class="glass" style="padding:1.5rem">
                <h3><i data-lucide="briefcase"></i> POSITIONS</h3>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Sym</th><th>Qty</th><th>Entry</th><th>Current</th><th>P/L</th></tr></thead>
                        <tbody id="posTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass" style="margin-top:1rem; padding:1.5rem">
                <h3><i data-lucide="clock"></i> PENDING ORDERS</h3>
                <div id="pendingOrders" class="orders-list"></div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
