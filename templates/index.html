<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Hub — Premium Dashboard</title>
    
    <!-- External Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>ANTIGRAVITY TRADING</h1>
            </div>
            <div class="status-badge">
                <span class="dot" id="statusDot"></span>
                <span id="modeText">...</span>
                <span id="autoTradingStatus" style="color: var(--text-dim); margin-left: 0.5rem; border-left: 1px solid var(--border); padding-left: 0.5rem; font-size: 0.75rem;">AUTO: OFF</span>
            </div>
        </header>

        <div class="info-bar glass-card">
            <div class="stat-item">
                <h3>Capital Total</h3>
                <p id="totalEquity">$0.00</p>
                <div class="sub" id="totalPL">+$0.00 (0.0%)</div>
            </div>
            <div class="stat-item" style="grid-column: span 2;">
                <h3>Estado Watchlist</h3>
                <div class="watchlist-container" id="watchlistStatus">
                    <!-- Status chips for each symbol injected here -->
                    <span style="color: var(--text-dim); font-size: 0.8125rem;">Esperando inicio...</span>
                </div>
            </div>
            <div class="stat-item" style="display: flex; align-items: flex-end; justify-content: flex-end;">
                <button class="btn btn-success" id="toggleBtn" onclick="toggleAutomation()">
                    <i data-lucide="play"></i>
                    Iniciar Automatización
                </button>
            </div>
        </div>

        <div class="grid">
            <div class="main-col">
                <!-- Positions Panel -->
                <div class="glass-card">
                    <h2 class="section-title">
                        <i data-lucide="briefcase" size="18"></i>
                        Posiciones Abiertas
                    </h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Instrumento</th>
                                    <th>Cantidad</th>
                                    <th>Entrada</th>
                                    <th>Actual</th>
                                    <th>G/P</th>
                                </tr>
                            </thead>
                            <tbody id="positionsTable">
                                <tr>
                                    <td colspan="5" style="text-align: center; color: var(--text-dim); border: none;">No hay posiciones abiertas</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="side-col">
                <!-- Activity History -->
                <div class="glass-card" style="height: calc(100% - 1.5rem);">
                    <h2 class="section-title">
                        <i data-lucide="activity" size="18"></i>
                        Actividad Reciente
                    </h2>
                    <ul class="history-list" id="historyList">
                        <li style="text-align: center; padding: 2rem 0; color: var(--text-dim); font-size: 0.8125rem;">Sin actividad</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
