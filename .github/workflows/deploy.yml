name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] # Cambia a 'master' si es el nombre de tu rama principal

  # Permite correr esto manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://raksoda:$HF_TOKEN@huggingface.co/spaces/raksoda/hostingPython main
